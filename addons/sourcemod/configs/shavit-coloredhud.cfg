// This is the configuration file for default HUD elements for shavit-coloredhud plugin.
// Colors are in RGB format "R,G,B" (0-255). Positions are in "X;Y" format (-1.0 for centered).
"Elements"
{
	"Speedometer"
	{
		"enabled" 			"1" // Whether to enable this HUD element (0=disabled, 1=enabled)
		"position" 			"-1.00;0.60" // Position of the HUD element
		"logic_display" 	"0" // Display logic (specific meanings in each element's comments)
		// NO display logic for this element
		"logic_color" 		"1" // Color logic (specific meanings in each element's comments)
		// Color Logic: 0 - None; 1 - Speed Gaining / Losing 

		// Color keys & RGB values
		"Color_Speed_Default" 				"255,255,255"
		"Color_SpeedGradient_Gain" 			"40,150,255"
		"Color_SpeedGradient_Lose" 			"255,70,60"
	}

	"SpeedDifference"
	{
		"enabled" 			"0"
		"position" 			"-1.00;0.63"
		"logic_display" 	"0" // NO display logic for this element
		"logic_color" 		"1" // Color Logic: 0 - None; 1 - Difference is Positive/Negative (Higher / Lower Speed) 

		"Color_SpeedDifference_Default" 	"255,255,255"
		"Color_SpeedDifference_Higher" 		"0,255,0"
		"Color_SpeedDifference_Lower" 		"255,0,0"
	}

	"Energymeter"
	{
		"enabled" 			"0"
		"position" 			"-1.00;0.50"
		"logic_display" 	"0" // NO display logic for this element
		"logic_color" 		"1" // Color Logic: 0 - None; 1 - Energy Gaining/Losing; 2 - Current Energy Greater/Less than initial energy 

		"Color_Energy_Default" 				"255,255,255"
		"Color_EnergyGradient_Gain" 		"40,150,255"
		"Color_EnergyGradient_Lose" 		"255,70,60"
		"Color_Energy_Higher" 				"0,255,0"
		"Color_Energy_Lower" 				"255,0,0"
	}

	"Timer"
	{
		"enabled" 			"1"
		"position" 			"-1.00;0.72"
		"logic_display"		"0" // 0 - Default time format; 1 - Full HMS format (hh:mm:ss.msms)
		"logic_color" 		"1" // Color Logic: 0 - None; 1 - Timer Status 

		"Color_Timer_Default" 				"255,255,255"
		"Color_Timer_Start" 				"200,200,200"
		"Color_Timer_Running" 				"25,255,75"
		"Color_Timer_Paused" 				"255,235,100"
		"Color_Timer_Practice" 				"130,196,255"
		"Color_Timer_Finished_Worse" 		"255,175,0"		
		"Color_Timer_Finished_PB" 			"20,195,20"
		"Color_Timer_Finished_WR" 			"155,50,230"
		"Color_Timer_Stopped" 				"255,100,100"
	}
	
	"TimeDifference"
	{
		"enabled" 			"1"
		"position" 			"-1.00;0.30"
		"logic_display"		"2" // 0 - Dynamic Time Difference; 1 - Checkpoint Time comparison with PB; 1 - Checkpoint Time comparison with WR;
		"logic_color"		"2" // Color Logic: 0 - None; 1 - Time Gaining/Losing (Catching up / Falling behind); 2 - Difference is Negative/Positive (Faster / Slower time)

		"Color_TimeDifference_Default"		"255,255,255"
		"Color_TimeDifference_Faster"		"0,255,0"
		"Color_TimeDifference_Slower"		"255,0,0"
		"Color_TimeDifference_Gain"			"0,255,0"
		"Color_TimeDifference_Lose"			"255,0,0"
	}
}
